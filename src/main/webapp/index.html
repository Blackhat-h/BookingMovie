<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #6dd5ed, #2193b0);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* Header */
    header {
      background: #0d47a1;
      color: white;
      padding: 15px 40px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 1px;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.2);
    }

    /* Main content */
    .container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: #fff;
      padding: 40px 60px;
      border-radius: 15px;
      box-shadow: 0px 8px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 400px;
      width: 100%;
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
      color: #333;
    }

    a {
      display: inline-block;
      margin: 10px;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    a:first-of-type {
      background: #4CAF50;
    }
    a:first-of-type:hover {
      background: #45a049;
    }

    a:last-of-type {
      background: #2196F3;
    }
    a:last-of-type:hover {
      background: #1976D2;
    }

    /* Footer */
    footer {
      background: #0d47a1;
      color: white;
      text-align: center;
      padding: 12px 20px;
      font-size: 0.9rem;
      box-shadow: 0 -2px 8px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    My Web Application
  </header>

  <!-- Main content -->
  <div class="container">
    <div class="card">
      <h1>Welcome BookingMovie</h1>
      <a href="Login.jsp">Login</a>
      <a href="register.html">Register</a>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    &copy; 2025 My Web Application. All rights reserved.
  </footer>
</body>
</html>
